<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RML Group - The Grand Tour</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-gesture-handling@1.2.2/dist/leaflet-gesture-handling.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>

  <div id="branding">
    <div class="brand-logo">
      <img src="Logo 2.png" alt="RML Group" class="logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
      <svg viewBox="0 0 48 48" class="shield-icon" style="display:none">
        <path d="M24 2L4 12v10c0 14.3 8.6 22.5 20 26 11.4-3.5 20-11.7 20-26V12L24 2z" fill="#141414" stroke="#C8102E" stroke-width="1.8"/>
        <text x="24" y="22" text-anchor="middle" fill="#C8102E" font-size="10" font-weight="700" font-family="Inter,sans-serif">RML</text>
        <text x="24" y="34" text-anchor="middle" fill="#fff" font-size="5" font-weight="600" font-family="Inter,sans-serif">GROUP</text>
      </svg>
      <div class="brand-text">
        <span class="brand-title">The Grand Tour</span>
        <span class="brand-subtitle">HQ to Motor Valley</span>
      </div>
    </div>
  </div>

  <div id="title-bar">
    <div class="title-bar-inner">
      <span class="title-bar-label">THE GRAND TOURER</span>
      <span class="title-bar-route">RML Group · UK to Motor Valley</span>
      <span class="title-bar-date">25 – 30 May 2026</span>
    </div>
  </div>

  <div id="timeline-toggle">
    <svg class="toggle-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M7 10.5L2 5.5L3.5 4L7 7.5L10.5 4L12 5.5L7 10.5Z" fill="white"/>
    </svg>
    <span class="toggle-label" id="toggle-label">Journey Timeline</span>
  </div>

  <div id="timeline-panel">
    <div class="timeline-header">
      <div class="timeline-header-left">
        <h2>The Grand Tour</h2>
        <p class="timeline-subtitle">RML Group · 25–30 May 2026</p>
      </div>
      <div class="timeline-header-right">
        <div id="tour-controls">
          <button id="tour-btn" class="tour-btn" title="Start Tour">
            <svg width="14" height="14" viewBox="0 0 14 14"><polygon points="3,1 13,7 3,13" fill="white"/></svg>
          </button>
          <div id="tour-info" class="tour-info">
            <span class="tour-location">Ready</span>
          </div>
        </div>
        <button id="timeline-close" aria-label="Close timeline">&times;</button>
      </div>
    </div>
    <div id="tour-progress"><div id="tour-progress-bar"></div></div>
    <div class="timeline-scroll" id="timeline-scroll"></div>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <button id="modal-close" aria-label="Close modal">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-gesture-handling@1.2.2/dist/leaflet-gesture-handling.min.js"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
